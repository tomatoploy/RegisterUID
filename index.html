<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนรับใบแจ้งหนี้ออนไลน์</title>
    <!-- นำเข้า Google Fonts คล้ายสไตล์มินิมอลโมเดิร์น -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- นำเข้า LINE LIFF SDK (จำเป็นมากสำหรับการดึง UID จริง) -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            padding: 32px 24px;
            text-align: center;
        }

        .logo-area {
            margin-bottom: 24px;
        }

        .logo-area img {
            width: 70px;
            height: auto;
            margin-bottom: 12px;
            border-radius: 50%;
            object-fit: cover;
        }

        h2 {
            color: #1f2937;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: #4b5563;
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #374151;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            color: #1f2937;
            transition: all 0.2s ease;
            outline: none;
            background-color: #f9fafb;
        }

        input:focus {
            border-color: #f75c1c;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(247, 92, 28, 0.1);
        }

        .btn-submit {
            width: 100%;
            background-color: #f75c1c;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 12px;
            box-shadow: 0 4px 12px rgba(247, 92, 28, 0.2);
        }

        .btn-submit:hover {
            background-color: #dc4a0c;
        }
        
        .btn-submit:disabled {
            background-color: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
        }

        .footer-text {
            margin-top: 24px;
            font-size: 12px;
            color: #9ca3af;
        }
        
        /* สไตล์หน้าจอทำรายการสำเร็จ */
        .success-view {
            display: none;
        }
        
        .success-icon {
            font-size: 56px;
            color: #06c755;
            margin-bottom: 16px;
        }
        
        #loadingText {
            font-size: 12px;
            color: #f75c1c;
            margin-bottom: 10px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container" id="mainCard">
        <!-- หน้าฟอร์มลงทะเบียน -->
        <div id="formView">
            <div class="logo-area">
                <img src="Logo.png" alt="เพชร พลอย เพลส">
                <h2>เพชร พลอย เพลส</h2>
                <p class="subtitle">ลงทะเบียนเพื่อเชื่อมต่อบัญชี LINE สำหรับรับใบเสร็จและใบแจ้งหนี้ประจำเดือน</p>
            </div>

            <!-- ข้อความแจ้งสถานะโหลดข้อมูลจาก LINE -->
            <div id="loadingText">กำลังเชื่อมต่อระบบ LINE...</div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="roomNumber">หมายเลขห้องพัก</label>
                    <input type="text" id="roomNumber" placeholder="ตัวอย่าง: 101" required>
                </div>

                <div class="form-group">
                    <label for="telephone">เบอร์โทรศัพท์</label>
                    <input type="tel" id="telephone" placeholder="ตัวอย่าง: 0845251330" required>
                </div>

                <button type="submit" id="submitBtn" class="btn-submit" disabled>ยืนยันการลงทะเบียน</button>
            </form>
            <p class="footer-text">© 2026 Petch Ploy Place. All rights reserved.</p>
        </div>

        <!-- หน้าจอลงทะเบียนสำเร็จ -->
        <div id="successView" class="success-view">
            <div class="success-icon">✓</div>
            <h2>ลงทะเบียนสำเร็จ</h2>
            <p class="subtitle" style="margin-bottom: 20px;">ระบบได้ผูกบัญชี LINE ของคุณกับห้องพักเรียบร้อยแล้ว ขอบคุณครับ</p>
            <button class="btn-submit" onclick="liff.closeWindow();" style="background-color: #4b5563; box-shadow: none;">ปิดหน้าต่างนี้</button>
        </div>
    </div>

    <script>
        const MY_LIFF_ID = '2010715614-37aEPk2I'; 
        let userUid = ""; 

        // เริ่มต้นการทำงานของ LINE LIFF อัตโนมัติเมื่อเปิดหน้าเว็บ
        liff.init({ liffId: MY_LIFF_ID })
            .then(() => {
                if (!liff.isLoggedIn()) {
                    liff.login(); // บังคับล็อกอินหากไม่ได้เปิดในแอป LINE
                } else {
                    liff.getProfile()
                        .then(profile => {
                            userUid = profile.userId; // 📌 ดึง LINE UID ของจริงสำเร็จ!
                            document.getElementById('loadingText').style.display = 'none';
                            document.getElementById('submitBtn').disabled = false; // เปิดให้กดปุ่มได้
                        })
                        .catch(err => {
                            document.getElementById('loadingText').innerText = "ดึงข้อมูลโปรไฟล์ล้มเหลว";
                            console.error(err);
                        });
                }
            })
            .catch(err => {
                document.getElementById('loadingText').innerText = "เชื่อมต่อ LINE ล้มเหลว";
                console.error(err);
            });

        // ฟังก์ชันเมื่อกดส่งฟอร์ม
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const room = document.getElementById('roomNumber').value;
            const tel = document.getElementById('telephone').value;
            
            document.getElementById('submitBtn').innerText = "กำลังบันทึกข้อมูล...";
            document.getElementById('submitBtn').disabled = true;

            // ส่งข้อมูลไปยัง Google Apps Script
            fetch('https://script.google.com/macros/s/AKfycbx65cUVfNubVAMVNb4yE745YEfrxQoZ64-QcUWiazpiN2Xis_dJdCp1QI1DzwRa9PwL2g/exec', {
                method: 'POST',
                body: JSON.stringify({ room: room, tel: tel, uid: userUid })
            })
            .then(res => {
                // แสดงหน้าจอสำเร็จ
                document.getElementById('formView').style.display = 'none';
                document.getElementById('successView').style.display = 'block';
            })
            .catch(err => {
                alert("เกิดข้อผิดพลาดในการบันทึกข้อมูล กรุณาลองใหม่อีกครั้ง");
                document.getElementById('submitBtn').innerText = "ยืนยันการลงทะเบียน";
                document.getElementById('submitBtn').disabled = false;
            });
        });
    </script>
</body>
</html>
